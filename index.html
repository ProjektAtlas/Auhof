<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141517">
<title>Auhof · Bestellungen</title>
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="auhof-icon-512.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141517; --panel:#1c1d20; --panel2:#24262b; --line:#34363c;
    --ink:#e9eaec; --dim:#9a9ca2; --faint:#6a6c72;
    --red:#cf3229; --red-deep:#a5231b; --danger:#c65c6a; --ok:#8bb06a;
    --radius:14px; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:600; margin:0}
  .mono{font-family:var(--mono); font-feature-settings:'tnum' 1; letter-spacing:.02em}
  button{font-family:inherit; font-size:14px; cursor:pointer; border:none; border-radius:10px; padding:.6rem 1rem; transition:transform .06s ease, background .15s ease, border-color .15s}
  button:active{transform:translateY(1px)}
  .btn{background:var(--red); color:#fff; font-weight:600}
  .btn:hover{background:var(--red-deep)}
  .btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--dim)}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid #4a2c30}
  .btn-danger:hover{background:#2c1c1e}
  .btn-sm{padding:.35rem .6rem; font-size:13px; border-radius:8px}
  input,select,textarea{
    font-family:inherit; font-size:15px; color:var(--ink); background:var(--panel2);
    border:1px solid var(--line); border-radius:10px; padding:.55rem .7rem; width:100%;
  }
  textarea{resize:vertical; line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--red-deep); outline-offset:-1px; border-color:var(--red-deep)}
  label{display:block; font-size:13px; color:var(--dim); margin-bottom:.3rem}
  a{color:var(--red)}

  /* Layout */
  .topbar{
    position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:1rem;
    padding:.8rem 1.1rem; background:rgba(20,21,23,.9); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .brand{font-family:'Space Grotesk'; font-weight:700; font-size:18px; letter-spacing:.01em}
  .brand span{color:var(--red)}
  .who{margin-left:auto; text-align:right; font-size:13px; color:var(--dim)}
  .who b{color:var(--ink); font-weight:600}
  .role-chip{display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--red); border:1px solid #5a2622; border-radius:999px; padding:.1rem .5rem; margin-left:.4rem}
  .tabs{display:flex; gap:.3rem; padding:.6rem 1rem 0; border-bottom:1px solid var(--line); overflow-x:auto}
  .tab{background:transparent; color:var(--dim); border:none; border-bottom:2px solid transparent;
    border-radius:0; padding:.6rem .7rem; font-weight:500; white-space:nowrap}
  .tab.active{color:var(--ink); border-bottom-color:var(--red)}
  .subtabs{display:flex; gap:.3rem; margin:0 0 1.3rem; border-bottom:1px solid var(--line); overflow-x:auto}
  .wrap{max-width:900px; margin:0 auto; padding:1.4rem 1.1rem 5rem}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:1.1rem}
  .card + .card{margin-top:.9rem}
  .muted{color:var(--dim)}
  .row{display:flex; gap:.6rem; align-items:center; flex-wrap:wrap}
  .stack{display:flex; flex-direction:column; gap:.7rem}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:.7rem}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}

  /* Tab-Leisten: sauber scrollen statt Scrollbar zeigen */
  .tabs,.subtabs{scrollbar-width:none; -webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar,.subtabs::-webkit-scrollbar{display:none}

  /* Verwaltungstabellen: horizontal scrollbar, Spalten bleiben erhalten */
  .tscroll{-webkit-overflow-scrolling:touch}
  .tscroll::-webkit-scrollbar{height:8px}
  .tscroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px}

  /* ---- Handy: enger + Tabellen horizontal scrollbar ---- */
  @media(max-width:560px){
    .wrap{padding-left:.9rem; padding-right:.9rem}
    .topbar{gap:.6rem; padding:.7rem .9rem}
    .brand{font-size:16px}
    .tab{padding:.6rem .55rem; font-size:13px}
    .tscroll{overflow-x:auto}
    .tscroll table.list{min-width:560px}
  }

  /* Login */
  .login{max-width:360px; margin:12vh auto 0; padding:0 1.1rem}
  .login .card{padding:1.6rem}
  .login h1{font-size:24px; margin-bottom:.2rem}
  .login .sub{color:var(--dim); margin-bottom:1.4rem; font-size:14px}

  /* Groups & articles */
  .group-h{display:flex; align-items:baseline; gap:.6rem; margin:1.4rem 0 .5rem}
  .group-h:first-child{margin-top:.2rem}
  .group-h h3{font-size:16px}
  .group-h .count{font-size:12px; color:var(--faint)}
  .art{display:flex; align-items:center; gap:.7rem; padding:.6rem .8rem; background:var(--panel);
    border:1px solid var(--line); border-radius:10px}
  .art + .art{margin-top:.4rem}
  .art .name{flex:1}
  .art .name small{color:var(--faint); font-size:12px; margin-left:.4rem}
  .inactive{opacity:.5}
  .qty{width:74px; text-align:center}
  .stepper{display:flex; align-items:center; gap:.35rem}
  .stepper button{width:32px; height:32px; padding:0; background:var(--panel2); color:var(--ink);
    border:1px solid var(--line); font-size:18px; line-height:1}

  /* Order tickets */
  .ticket{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .ticket + .ticket{margin-top:.8rem}
  .ticket-top{display:flex; align-items:center; gap:.7rem; padding:.85rem 1rem; border-bottom:1px dashed var(--line)}
  .ticket-nr{font-family:var(--mono); font-weight:700; color:var(--red); font-size:15px}
  .ticket-meta{margin-left:auto; text-align:right; font-size:12px; color:var(--dim)}
  .ticket-body{padding:.7rem 1rem}
  .pos{display:flex; gap:.7rem; padding:.22rem 0; font-size:14px}
  .pos .m{font-family:var(--mono); font-weight:700; min-width:2.4em; text-align:right; color:var(--ink)}
  .pos .n{color:var(--ink)}
  .ticket-actions{display:flex; gap:.5rem; padding:.6rem 1rem .85rem}

  /* summary bar for ordering */
  .summary{position:fixed; left:0; right:0; bottom:0; z-index:20; background:rgba(28,29,32,.96);
    backdrop-filter:blur(8px); border-top:1px solid var(--line); padding:.8rem 1.1rem;
    display:flex; align-items:center; gap:1rem}
  .summary .info{font-size:14px; color:var(--dim)}
  .summary .info b{color:var(--ink)}
  .summary .btn{margin-left:auto}

  .toast{position:fixed; left:50%; bottom:5.5rem; transform:translateX(-50%); z-index:50;
    background:#0d0e10; color:var(--ink); border:1px solid var(--line); border-radius:10px;
    padding:.7rem 1rem; font-size:14px; max-width:88vw; box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .toast.err{border-color:#5a2f34; color:#f0c2c7}
  .toast.ok{border-color:#3f5030}

  .empty{text-align:center; color:var(--dim); padding:2.5rem 1rem}
  .empty .big{font-size:15px; color:var(--ink); margin-bottom:.3rem}

  table.list{width:100%; border-collapse:collapse}
  table.list th{text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--faint); font-weight:600; padding:.4rem .5rem; border-bottom:1px solid var(--line)}
  table.list td{padding:.55rem .5rem; border-bottom:1px solid var(--line); vertical-align:middle}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}

  /* Umschalter Abteilung <-> Kunde */
  .seg{display:inline-flex; gap:.25rem; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:.2rem}
  .seg-btn{background:transparent; color:var(--dim); border-radius:8px; padding:.4rem .8rem; font-weight:500}
  .seg-btn.active{background:var(--red); color:#fff; font-weight:600}

  /* Info-Zeilen auf Kunden-Tickets */
  .kv{display:flex; gap:.6rem; padding:.18rem 0; font-size:14px}
  .kv .k{color:var(--dim); min-width:130px; flex-shrink:0}
  .kv .v{color:var(--ink); white-space:pre-wrap; overflow-wrap:anywhere}
  .kv-div{border-top:1px dashed var(--line); margin:.5rem 0}

  /* Print */
  #print-area{position:fixed; left:-10000px; top:0}
  @media print{
    body{background:#fff}
    body > *:not(#print-area){display:none!important}
    #print-area{position:static; left:0; color:#000; padding:0; font-family:Inter,sans-serif}
    #print-area h2{font-family:'Space Grotesk'}
    #print-area .p-nr{font-family:var(--mono); font-weight:700}
    #print-area table{width:100%; border-collapse:collapse; margin-top:12px}
    #print-area td{padding:4px 6px; border-bottom:1px solid #ccc}
    #print-area .pm{font-family:var(--mono); font-weight:700; text-align:right; width:60px}
    #print-area .p-page + .p-page{page-break-before:always}
    #print-area .p-sub{margin-top:16px}
    #print-area .p-sub .p-nr{font-size:15px}
    #print-area .pk{font-weight:600; width:150px; vertical-align:top}
    #print-area .p-ft{white-space:pre-wrap; margin-top:6px}
    #print-area .p-ft-h{margin-top:12px; font-weight:700}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="print-area"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL  = "https://rxbexbchygldbcohfovs.supabase.co";
const SUPABASE_ANON = "sb_publishable_X5lVMyp3A5Q3q7v54JRwTg_xcuGLpGx";
const FUNKTION      = "swift-responder";
const MAIL_DOMAIN   = "@auhof.local";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ---- App-Zustand ----
const state = {
  konto:null,            // { id, name, rolle, kuerzel }
  tab:null, subtab:null, // oberste Ebene + Untertab (Verwaltung)
  artikelFilter:"",      // Gruppen-Filter in „Artikel erfassen" ("" = alle)
  gruppen:[], artikel:[], bestellungen:[], konten:[],
  kundenbestellungen:[], // Bestellart "Kunden" (Freitext)
  abteilungenListe:[],   // {id,name,kuerzel} aller Abteilungen (für Abhol-Auswahl)
  cart:{},               // { artikel_id: menge }
  editBestellung:null,   // aktuell zu ändernde Abteilungsbestellung (oder null)
  editProbleme:[],       // Namen inaktiver/entfernter Artikel beim Ändern
  editKunde:null,        // aktuell zu ändernde Kundenbestellung (oder null)
  listenModus:"abteilung", // Umschalter in den Listen: "abteilung" | "kunde"
  bestellTag:null,       // gewählter Tag in "Bestellungen" (YYYY-MM-DD), null = heute
  auswVon:null, auswBis:null, // Zeitraum in "Auswertung" (YYYY-MM-DD), null = heute
  auswAbt:"",            // Abteilungsfilter (Kürzel) in "Auswertung", "" = alle
};

const app = document.getElementById("app");

// ---- sichere DOM-Erstellung (kein innerHTML mit Daten) ----
function h(tag, attrs={}, ...kids){
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)){
    if (v==null) continue;
    if (k==="class") e.className=v;
    else if (k==="text") e.textContent=v;
    else if (k==="html") e.innerHTML=v;            // nur für statische Icons
    else if (k.startsWith("on") && typeof v==="function") e.addEventListener(k.slice(2), v);
    else e.setAttribute(k,v);
  }
  for (const kid of kids.flat()){
    if (kid==null || kid===false) continue;
    e.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return e;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

let toastTimer=null;
function toast(msg, kind=""){
  const t = h("div",{class:"toast "+kind, text:msg});
  document.body.append(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(), 3800);
}

const ROLLE_LABEL = {admin:"Admin", leitung:"Leitung", abteilung:"Abteilung", konditorei:"Konditorei"};
function fmtDatum(iso){
  const d=new Date(iso);
  return d.toLocaleDateString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric"})
       + " " + d.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
}
// Reines Datum "YYYY-MM-DD" -> "TT.MM.JJJJ" (ohne Zeitzonen-Verschiebung)
function fmtTag(d){
  if (!d) return "";
  const [y,m,day] = String(d).slice(0,10).split("-");
  return day+"."+m+"."+y;
}
function abteilungName(id){
  if (!id) return "";
  const a = (state.abteilungenListe||[]).find(x=>x.id===id);
  return a ? a.name : "";
}

// ---- Bestellschluss (tägliche Uhrzeit, Zeitzone Europe/Zurich) ----
function hhmm(t){ return t ? String(t).slice(0,5) : ""; }      // "10:00:00" -> "10:00"
function jetztZuerichHHMM(){
  return new Date().toLocaleTimeString("en-GB",
    { timeZone:"Europe/Zurich", hour:"2-digit", minute:"2-digit", hour12:false });
}
function istNachBestellschluss(schluss){
  if (!schluss) return false;                                  // kein Bestellschluss = immer offen
  return jetztZuerichHHMM() > hhmm(schluss);                   // "HH:MM" nullgepolstert -> Stringvergleich = Zeitvergleich
}
// Kalendertag (Zeitzone Europe/Zurich) als "YYYY-MM-DD"
function heuteZuerich(){
  return new Date().toLocaleDateString("en-CA",{ timeZone:"Europe/Zurich" });
}
function zurichDatum(iso){
  return new Date(iso).toLocaleDateString("en-CA",{ timeZone:"Europe/Zurich" });
}

// =====================================================================
//  Auth
// =====================================================================
async function login(name, passwort){
  const email = name.trim().toLowerCase() + MAIL_DOMAIN;
  const { error } = await sb.auth.signInWithPassword({ email, password:passwort });
  if (error) return { error:"Name oder Passwort stimmt nicht." };
  return await ladeKontoUndStarten();
}

async function ladeKontoUndStarten(){
  const { data:{ user } } = await sb.auth.getUser();
  if (!user) return { error:"Nicht angemeldet." };
  const { data:konto, error } = await sb.from("konten")
    .select("id,name,rolle,kuerzel,bestellschluss,bestellschluss_kunde").eq("id", user.id).single();
  if (error || !konto){
    await sb.auth.signOut();
    return { error:"Für dieses Konto ist noch kein Zugang eingerichtet." };
  }
  state.konto = konto;
  await ladeDaten();
  return { ok:true };
}

async function logout(){
  await sb.auth.signOut();
  state.konto=null; state.cart={}; state.tab=null; state.subtab=null;
  state.editBestellung=null; state.editProbleme=[];
  state.editKunde=null; state.listenModus="abteilung";
  state.kundenbestellungen=[]; state.abteilungenListe=[];
  state.auswVon=null; state.auswBis=null; state.auswAbt="";
  renderLogin();
}

// =====================================================================
//  Daten laden (je nach Rolle)
// =====================================================================
async function ladeDaten(){
  const r = state.konto.rolle;

  const g = await sb.from("gruppen").select("*").order("sortierung").order("name");
  state.gruppen = g.data || [];

  const a = await sb.from("artikel").select("*").order("name");
  state.artikel = a.data || [];

  if (r!=="abteilung" || true){
    const b = await sb.from("bestellungen")
      .select(`id,bestellnr,jahr,monat,laufnr,erstellt_am,
               abteilung:konten!bestellungen_abteilung_id_fkey(name,kuerzel,sammelbestellung),
               positionen:bestellpositionen(menge, artikel_id, artikel(name))`)
      .order("erstellt_am",{ascending:false});
    state.bestellungen = b.data || [];
  }

  // Kundenbestellungen (RLS: eigene bzw. für Konditorei/Leitung/Admin alle)
  const kb = await sb.from("kundenbestellungen")
    .select(`id,bestellnr,jahr,monat,laufnr,erstellt_am,
             vorname,nachname,email,telefon,bezahlart,bezahlt,modus,
             rechnungsadresse,lieferadresse,liefertag,lieferzeit,freitext,
             abteilung_id,abhol_abteilung_id,
             abteilung:konten!kundenbestellungen_abteilung_id_fkey(name,kuerzel,sammelbestellung)`)
    .order("erstellt_am",{ascending:false});
  state.kundenbestellungen = kb.data || [];

  // Abteilungs-Liste (id,name,kuerzel) für die Abhol-Auswahl im Kundenformular
  const al = await sb.rpc("abteilungen_liste");
  state.abteilungenListe = al.data || [];

  if (r==="admin" || r==="leitung"){
    const k = await sb.from("konten").select("id,name,rolle,kuerzel,bestellschluss,bestellschluss_kunde,sammelbestellung").order("rolle").order("name");
    state.konten = k.data || [];
  }
}

function tabsFor(rolle){
  if (rolle==="abteilung") return [["bestellen","Bestellen"],["kunde","Kundenbestellung"],["meine","Meine Bestellungen"]];
  if (rolle==="konditorei") return [["alle","Bestellungen"]];
  if (rolle==="leitung")   return [["alle","Bestellungen"],["auswertung","Auswertung"],["verwaltung", ROLLE_LABEL.leitung]];
  if (rolle==="admin")     return [["alle","Bestellungen"],["auswertung","Auswertung"],["verwaltung", ROLLE_LABEL.admin]];
  return [];
}

// =====================================================================
//  Render: Login
// =====================================================================
function renderLogin(){
  clear(app);
  const nameI = h("input",{type:"text",autocomplete:"username"});
  const pwI   = h("input",{type:"password",autocomplete:"current-password"});
  const btn   = h("button",{class:"btn",style:"width:100%",text:"Anmelden"});

  async function tryLogin(){
    if (!nameI.value.trim() || !pwI.value) return toast("Name und Passwort eingeben.","err");
    btn.disabled=true; btn.textContent="Anmelden…";
    const res = await login(nameI.value, pwI.value);
    btn.disabled=false; btn.textContent="Anmelden";
    if (res.error) return toast(res.error,"err");
    renderApp();
  }
  btn.addEventListener("click", tryLogin);
  pwI.addEventListener("keydown", e=>{ if(e.key==="Enter") tryLogin(); });

  app.append(
    h("div",{class:"login"},
      h("h1",{style:"font-size:38px;text-align:center;margin-bottom:1.1rem"},
        h("span",{style:"color:var(--red)"},"Auhof"), " Orders"),
      h("div",{class:"card"},
        h("div",{class:"stack"},
          h("div",{}, h("label",{text:"Name"}), nameI),
          h("div",{}, h("label",{text:"Passwort"}), pwI),
          btn
        )
      )
    )
  );
}

// =====================================================================
//  Render: App-Rahmen
// =====================================================================
function renderApp(){
  clear(app);
  const k = state.konto;
  const tabDefs = tabsFor(k.rolle);
  if (!state.tab || !tabDefs.find(t=>t[0]===state.tab)) state.tab = tabDefs[0][0];

  const topbar = h("div",{class:"topbar"},
    h("div",{class:"brand"}, h("span",{},"Auhof"), " Orders"),
    h("div",{class:"who"},
      h("div",{}, h("b",{text:k.name})),
    ),
    h("button",{class:"btn-ghost btn-sm",text:"Abmelden",onclick:logout})
  );

  const tabs = h("div",{class:"tabs"},
    ...tabDefs.map(([id,label])=>
      h("button",{class:"tab"+(state.tab===id?" active":""),text:label,
        onclick:()=>{
          state.tab=id;
          if (state.editBestellung){ state.editBestellung=null; state.editProbleme=[]; state.cart={}; }
          if (state.editKunde){ state.editKunde=null; }
          renderApp();
        }})
    )
  );

  const wrap = h("div",{class:"wrap"});
  app.append(topbar, tabs, wrap);

  const view = state.tab;
  if (view==="bestellen")       renderBestellen(wrap, state.editBestellung);
  else if (view==="kunde")      renderKundeFormular(wrap, state.editKunde);
  else if (view==="meine")      renderBestellungen(wrap, true);
  else if (view==="alle")       renderBestellungen(wrap, false);
  else if (view==="auswertung") renderAuswertung(wrap);
  else if (view==="verwaltung") renderVerwaltung(wrap);
}

// =====================================================================
//  Verwaltung (Admin/Leitung): Untertabs
// =====================================================================
function renderVerwaltung(wrap){
  const subDefs = [
    ["gruppen","Gruppe erstellen"],
    ["artikel","Artikel erfassen"],
    ["abteilungen","Abteilungen"],
  ];
  if (!state.subtab || !subDefs.find(s=>s[0]===state.subtab)) state.subtab = subDefs[0][0];

  wrap.append(h("div",{class:"subtabs"},
    ...subDefs.map(([id,label])=>
      h("button",{class:"tab"+(state.subtab===id?" active":""),text:label,
        onclick:()=>{ state.subtab=id; renderApp(); }})
    )
  ));

  const inner = h("div",{});
  wrap.append(inner);

  if (state.subtab==="gruppen")          renderGruppen(inner);
  else if (state.subtab==="artikel")     renderArtikel(inner);
  else if (state.subtab==="abteilungen") renderAbteilungen(inner);
}

// =====================================================================
//  Ändern starten: Warenkorb aus bestehender Bestellung vorausfüllen
// =====================================================================
function starteAendern(b){
  state.cart = {};
  const probleme = [];
  (b.positionen||[]).forEach(p=>{
    const art = p.artikel_id ? state.artikel.find(a=>a.id===p.artikel_id) : null;
    if (art && art.aktiv) state.cart[p.artikel_id] = p.menge;
    else probleme.push(p.artikel?.name || "(entfernter Artikel)");
  });
  state.editBestellung = b;
  state.editProbleme   = probleme;
  state.tab = "bestellen";
  renderApp();
}

// =====================================================================
//  Abteilung: Bestellen / Ändern
// =====================================================================
function renderBestellen(wrap, editB=null){
  const aktive = state.artikel.filter(a=>a.aktiv);
  if (aktive.length===0){
    wrap.append(h("div",{class:"empty"},
      h("div",{class:"big",text:"Noch keine Artikel vorhanden."}),
      h("div",{class:"muted",text:"Die Leitung legt zuerst Artikel an."})));
    return;
  }

  // Kopf im Ändern-Modus
  if (editB){
    wrap.append(h("div",{class:"card",style:"margin-bottom:1rem;display:flex;align-items:center;gap:.8rem"},
      h("div",{},
        h("div",{style:"font-weight:600",text:"Bestellung ändern"}),
        h("div",{class:"mono muted",style:"font-size:13px",text:editB.bestellnr})
      ),
      h("button",{class:"btn-ghost btn-sm",style:"margin-left:auto",text:"Abbrechen",
        onclick:()=>{ state.cart={}; state.editBestellung=null; state.editProbleme=[]; state.tab="meine"; renderApp(); }})
    ));
    if (state.editProbleme && state.editProbleme.length){
      wrap.append(h("div",{class:"card",style:"margin-bottom:1rem;border-color:#5a2f34;background:#2c1c1e"},
        h("div",{style:"color:#f0c2c7"},
          h("b",{text:"Hinweis: "}),
          "Diese ursprünglich bestellten Artikel sind nicht mehr aktiv und wurden nicht übernommen: ",
          state.editProbleme.join(", "), ".")
      ));
    }
  }

  const gruppen = [...state.gruppen];
  const ohneGruppe = aktive.filter(a=>!a.gruppe_id);

  // Bestellschluss-Hinweis / -Sperre
  const schluss = state.konto.bestellschluss;
  if (schluss){
    const zu = istNachBestellschluss(schluss);
    wrap.append(h("div",{class:"card",
      style:"padding:.7rem .9rem;margin-bottom:1rem;"+(zu ? "border-color:#5a2f34;background:#2c1c1e" : "")},
      zu
        ? h("div",{style:"color:#f0c2c7"},
            h("b",{text:"Bestellschluss "+hhmm(schluss)+" Uhr überschritten."}),
            " Für heute sind keine "+(editB?"Änderungen":"Bestellungen")+" mehr möglich.")
        : h("div",{class:"muted"}, "Bestellschluss heute um ",
            h("b",{style:"color:var(--ink)",text:hhmm(schluss)+" Uhr"}), ".")
    ));
  }

  function stepRow(a){
    const val = state.cart[a.id] || 0;
    const qty = h("input",{class:"qty mono",type:"number",min:"0",step:"1",value:String(val),
      inputmode:"numeric"});
    const setVal=(n)=>{
      n=Math.max(0, Math.floor(n||0));
      state.cart[a.id]=n; qty.value=String(n); updateSummary();
    };
    qty.addEventListener("input",()=>setVal(parseInt(qty.value,10)));
    return h("div",{class:"art"},
      h("div",{class:"name"}, a.name),
      h("div",{class:"stepper"},
        h("button",{type:"button",text:"−",onclick:()=>setVal((state.cart[a.id]||0)-1)}),
        qty,
        h("button",{type:"button",text:"+",onclick:()=>setVal((state.cart[a.id]||0)+1)})
      )
    );
  }

  for (const g of gruppen){
    const items = aktive.filter(a=>a.gruppe_id===g.id);
    if (items.length===0) continue;
    wrap.append(h("div",{class:"group-h"}, h("h3",{text:g.name}), h("span",{class:"count",text:items.length+" Artikel"})));
    items.forEach(a=>wrap.append(stepRow(a)));
  }
  if (ohneGruppe.length){
    wrap.append(h("div",{class:"group-h"}, h("h3",{text:"Ohne Gruppe"})));
    ohneGruppe.forEach(a=>wrap.append(stepRow(a)));
  }

  // Summenleiste
  const info = h("div",{class:"info"});
  const sendBtn = h("button",{class:"btn",text: editB ? "Änderung speichern" : "Bestellung senden"});
  const bar = h("div",{class:"summary"}, info, sendBtn);
  document.body.append(bar);

  function updateSummary(){
    const eintr = Object.values(state.cart).filter(n=>n>0);
    const posn = eintr.length;
    const summe = eintr.reduce((s,n)=>s+n,0);
    clear(info);
    info.append(h("span",{}, h("b",{text:String(posn)}), posn===1?" Position":" Positionen",
      "  ·  ", h("b",{text:String(summe)}), " Stück gesamt"));
    const zu = istNachBestellschluss(state.konto.bestellschluss);
    sendBtn.disabled = posn===0 || zu;
    sendBtn.style.opacity = (posn===0 || zu) ? .5 : 1;
  }
  updateSummary();

  sendBtn.addEventListener("click", async ()=>{
    if (istNachBestellschluss(state.konto.bestellschluss)){
      toast("Bestellschluss überschritten – heute nicht mehr möglich.","err");
      updateSummary();
      return;
    }
    const positionen = Object.entries(state.cart)
      .filter(([,n])=>n>0).map(([artikel_id,menge])=>({artikel_id, menge}));
    if (positionen.length===0) return;
    sendBtn.disabled=true; sendBtn.textContent = editB ? "Speichern…" : "Senden…";

    let data, error;
    if (editB){
      ({ data, error } = await sb.rpc("bestellung_aendern", { p_bestellung_id: editB.id, positionen }));
    } else {
      ({ data, error } = await sb.rpc("bestellung_anlegen", { positionen }));
    }

    sendBtn.disabled=false; sendBtn.textContent = editB ? "Änderung speichern" : "Bestellung senden";
    if (error){ toast("Konnte nicht speichern: "+error.message,"err"); return; }
    bar.remove();
    state.cart={};
    if (editB){
      state.editBestellung=null; state.editProbleme=[];
      toast("Bestellung "+editB.bestellnr+" geändert.","ok");
    } else {
      toast("Bestellung "+ (data?.bestellnr||"") + " gesendet.","ok");
    }
    await ladeDaten();
    state.tab="meine"; renderApp();
  });

  // Summenleiste entfernen, wenn Tab gewechselt wird
  const obs = new MutationObserver(()=>{
    if (!document.body.contains(wrap)){ bar.remove(); obs.disconnect(); }
  });
  obs.observe(document.body,{childList:true,subtree:true});
}

// =====================================================================
//  Bestellungen anzeigen  (meineNur = nur eigene -> Abteilungsansicht)
//  Mit Umschalter: Abteilungsbestellungen <-> Kundenbestellungen
// =====================================================================
function renderBestellungen(wrap, meineNur){
  const rolle = state.konto.rolle;
  const darfLoeschen   = rolle==="admin" || rolle==="leitung";
  const darfDrucken    = rolle==="admin" || rolle==="leitung" || rolle==="konditorei";
  const darfAendernAbt = rolle==="abteilung" && meineNur;   // eigene ändern
  const zeigeAbteilung = !meineNur;                          // in "alle" die Abteilung zeigen
  // Bezahlstatus umschalten: eigene Abteilung (nur eigene) oder Konditorei/Leitung/Admin (alle)
  const darfBezahltSetzen = (rolle==="abteilung" && meineNur)
    || rolle==="konditorei" || rolle==="leitung" || rolle==="admin";

  if (state.listenModus!=="kunde") state.listenModus = "abteilung";

  // ---- Umschalter Abteilung <-> Kunde ----
  function segLeiste(){
    return h("div",{class:"seg",style:"margin-bottom:1.1rem"},
      h("button",{class:"seg-btn"+(state.listenModus==="abteilung"?" active":""),
        text:"Abteilungsbestellungen",
        onclick:()=>{ if(state.listenModus!=="abteilung"){ state.listenModus="abteilung"; renderApp(); } }}),
      h("button",{class:"seg-btn"+(state.listenModus==="kunde"?" active":""),
        text:"Kundenbestellungen",
        onclick:()=>{ if(state.listenModus!=="kunde"){ state.listenModus="kunde"; renderApp(); } }})
    );
  }

  // =========================================================
  //  "meine": eigene Bestellungen (ohne Datums-/Drucksteuerung)
  // =========================================================
  if (meineNur){
    wrap.append(segLeiste());
    const container = h("div",{});
    wrap.append(container);
    if (state.listenModus==="abteilung")
      zeichneAbtListe(container, state.bestellungen, "Noch keine Abteilungsbestellungen.");
    else
      zeichneKundeListe(container, state.kundenbestellungen, "Noch keine Kundenbestellungen.");
    return;
  }

  // =========================================================
  //  "alle": Tagesfilter + Abteilungsfilter + Tag drucken
  //  (Tag drucken umfasst IMMER beide Bestellarten)
  // =========================================================
  const dateI = h("input",{type:"date",style:"max-width:170px"});
  dateI.value = state.bestellTag || heuteZuerich();

  const abtSel   = h("select",{style:"max-width:200px"});
  const countLbl = h("div",{class:"muted",style:"font-size:13px"});
  const printBtn = darfDrucken ? h("button",{class:"btn btn-sm",text:"Tag drucken"}) : null;

  wrap.append(h("div",{class:"row",style:"margin-bottom:1rem;align-items:flex-end"},
    h("div",{}, h("label",{text:"Tag"}), dateI),
    h("div",{}, h("label",{text:"Abteilung"}), abtSel),
    h("div",{style:"margin-left:auto;display:flex;align-items:center;gap:.7rem"}, countLbl, printBtn)
  ));

  wrap.append(segLeiste());
  const container = h("div",{});
  wrap.append(container);

  const aktTag   = ()=> dateI.value || heuteZuerich();
  const abtTag   = ()=> state.bestellungen.filter(b=>zurichDatum(b.erstellt_am)===aktTag());
  const kundeTag = ()=> state.kundenbestellungen.filter(b=>zurichDatum(b.erstellt_am)===aktTag());
  const nachAbt  = (arr)=> abtSel.value ? arr.filter(b=>b.abteilung?.kuerzel===abtSel.value) : arr;

  function baueAbtOptionen(){
    const kuerzel = [...new Set([
      ...abtTag().map(b=>b.abteilung?.kuerzel).filter(Boolean),
      ...kundeTag().map(b=>b.abteilung?.kuerzel).filter(Boolean),
    ])].sort();
    const vorher = abtSel.value;
    clear(abtSel);
    abtSel.append(h("option",{value:"",text:"Alle Abteilungen"}));
    kuerzel.forEach(k=>abtSel.append(h("option",{value:k,text:k})));
    abtSel.value = kuerzel.includes(vorher) ? vorher : "";
  }

  function zeichne(){
    if (state.listenModus==="abteilung"){
      const daten = nachAbt(abtTag());
      countLbl.textContent = daten.length + (daten.length===1?" Abteilungsbestellung":" Abteilungsbestellungen");
      zeichneAbtListe(container, daten, "Für diesen Tag gibt es keine Abteilungsbestellungen.");
    } else {
      const daten = nachAbt(kundeTag());
      countLbl.textContent = daten.length + (daten.length===1?" Kundenbestellung":" Kundenbestellungen");
      zeichneKundeListe(container, daten, "Für diesen Tag gibt es keine Kundenbestellungen.");
    }
    if (printBtn){
      const total = nachAbt(abtTag()).length + nachAbt(kundeTag()).length;
      printBtn.disabled = total===0;
      printBtn.style.opacity = total===0 ? .5 : 1;
    }
  }

  dateI.addEventListener("change",()=>{
    if (!dateI.value) dateI.value = heuteZuerich();
    state.bestellTag = dateI.value;
    baueAbtOptionen(); zeichne();
  });
  abtSel.addEventListener("change", zeichne);
  if (printBtn) printBtn.addEventListener("click", ()=>druckeTag(nachAbt(abtTag()), nachAbt(kundeTag())));

  baueAbtOptionen();
  zeichne();

  // ---- Liste: Abteilungsbestellungen ----
  function zeichneAbtListe(container, daten, leerText){
    clear(container);
    if (daten.length===0){
      container.append(h("div",{class:"empty"}, h("div",{class:"muted",text:leerText||"Keine Treffer."})));
      return;
    }
    for (const b of daten){
      const top = h("div",{class:"ticket-top"},
        h("span",{class:"ticket-nr",text:b.bestellnr}),
        zeigeAbteilung && b.abteilung ? h("span",{class:"muted",style:"font-size:13px",text:b.abteilung.name}) : null,
        h("span",{class:"ticket-meta",text:fmtDatum(b.erstellt_am)})
      );
      const body = h("div",{class:"ticket-body"});
      (b.positionen||[]).forEach(p=>{
        body.append(h("div",{class:"pos"},
          h("span",{class:"m",text:String(p.menge)}),
          h("span",{class:"n",text:p.artikel?.name || "(Artikel entfernt)"})
        ));
      });
      const zu = istNachBestellschluss(state.konto.bestellschluss);
      const actions = h("div",{class:"ticket-actions"},
        darfAendernAbt ? h("button",{class:"btn-ghost btn-sm",text:"Ändern",
          ...(zu ? {disabled:"disabled", style:"opacity:.5"} : {}),
          onclick:()=>starteAendern(b)}) : null,
        darfDrucken ? h("button",{class:"btn-ghost btn-sm",text:"Drucken",onclick:()=>druckeBestellung(b)}) : null,
        darfLoeschen ? h("button",{class:"btn-danger btn-sm",text:"Löschen",
          onclick:()=>loescheBestellung(b)}) : null
      );
      container.append(h("div",{class:"ticket"}, top, body, actions));
    }
  }

  // ---- Bezahlstatus umschalten (nur „Vor Ort"; nicht an Bestellschluss gebunden) ----
  function bezahltToggleBtn(b){
    const btn = h("button",{class:"btn-sm "+(b.bezahlt?"btn-ghost":"btn"),
      text: b.bezahlt ? "Als offen markieren" : "Als bezahlt markieren"});
    btn.addEventListener("click", async ()=>{
      const ziel = !b.bezahlt;
      btn.disabled=true;
      const { error } = await sb.rpc("kundenbestellung_bezahlt_setzen",
        { p_bestellung_id:b.id, p_bezahlt:ziel });
      btn.disabled=false;
      if (error){ toast("Bezahlstatus konnte nicht geändert werden: "+error.message,"err"); return; }
      b.bezahlt = ziel;
      toast(ziel ? "Als bezahlt markiert." : "Als offen markiert.","ok");
      renderApp();
    });
    return btn;
  }

  // ---- Liste: Kundenbestellungen ----
  function zeichneKundeListe(container, daten, leerText){
    clear(container);
    if (daten.length===0){
      container.append(h("div",{class:"empty"}, h("div",{class:"muted",text:leerText||"Keine Kundenbestellungen."})));
      return;
    }
    for (const b of daten){
      const kundeName = ((b.vorname||"")+" "+(b.nachname||"")).trim();
      const top = h("div",{class:"ticket-top"},
        h("span",{class:"ticket-nr",text:b.bestellnr}),
        h("span",{class:"muted",style:"font-size:13px",text:kundeName}),
        zeigeAbteilung && b.abteilung ? h("span",{class:"muted",style:"font-size:13px",text:"· "+b.abteilung.name}) : null,
        h("span",{class:"ticket-meta",text:fmtDatum(b.erstellt_am)})
      );
      const body = h("div",{class:"ticket-body"});
      kundeInfoPaare(b).forEach(([k,v])=>{
        body.append(h("div",{class:"kv"}, h("span",{class:"k",text:k}), h("span",{class:"v",text:v})));
      });
      body.append(h("div",{class:"kv-div"}));
      body.append(h("div",{class:"kv"},
        h("span",{class:"k",text:"Bestelltext"}),
        h("span",{class:"v",text:b.freitext||""})));

      const zu = istNachBestellschluss(state.konto.bestellschluss_kunde);
      const actions = h("div",{class:"ticket-actions"},
        (b.bezahlart==="vor_ort" && darfBezahltSetzen) ? bezahltToggleBtn(b) : null,
        darfAendernAbt ? h("button",{class:"btn-ghost btn-sm",text:"Ändern",
          ...(zu ? {disabled:"disabled", style:"opacity:.5"} : {}),
          onclick:()=>starteKundeAendern(b)}) : null,
        darfDrucken ? h("button",{class:"btn-ghost btn-sm",text:"Drucken",onclick:()=>druckeKundeBestellung(b)}) : null,
        darfLoeschen ? h("button",{class:"btn-danger btn-sm",text:"Löschen",
          onclick:()=>loescheKundeBestellung(b)}) : null
      );
      container.append(h("div",{class:"ticket"}, top, body, actions));
    }
  }

  async function loescheBestellung(b){
    if (!confirm("Bestellung "+b.bestellnr+" wirklich löschen?")) return;
    const { error } = await sb.from("bestellungen").delete().eq("id", b.id);
    if (error){ toast("Löschen fehlgeschlagen: "+error.message,"err"); return; }
    toast("Bestellung "+b.bestellnr+" gelöscht.","ok");
    await ladeDaten(); renderApp();
  }

  async function loescheKundeBestellung(b){
    if (!confirm("Kundenbestellung "+b.bestellnr+" wirklich löschen?")) return;
    const { error } = await sb.from("kundenbestellungen").delete().eq("id", b.id);
    if (error){ toast("Löschen fehlgeschlagen: "+error.message,"err"); return; }
    toast("Kundenbestellung "+b.bestellnr+" gelöscht.","ok");
    await ladeDaten(); renderApp();
  }
}

function druckeBestellung(b){
  const area = document.getElementById("print-area");
  clear(area);
  const tbl = h("table",{},
    ...(b.positionen||[]).map(p=>h("tr",{},
      h("td",{class:"pm",text:String(p.menge)}),
      h("td",{text:p.artikel?.name || "(Artikel entfernt)"})
    ))
  );
  area.append(
    h("h2",{text:"Auhof — Bestellung"}),
    h("div",{class:"p-nr",style:"margin-top:6px;font-size:18px",text:b.bestellnr}),
    h("div",{style:"margin-top:4px",text:(b.abteilung?.name? "Abteilung: "+b.abteilung.name : "")}),
    h("div",{style:"color:#555",text:"Datum: "+fmtDatum(b.erstellt_am)}),
    tbl
  );
  window.print();
}

// Tagesdruck: nach Abteilung gruppiert (Variante A).
//  Pro Abteilung zuerst die Abteilungsbestellungen:
//    - MIT Haken (sammelbestellung): alle des Tags untereinander auf EINEM Blatt.
//    - OHNE Haken: jede Bestellung auf einem eigenen Blatt.
//  Danach die Kundenbestellungen derselben Abteilung: IMMER je ein eigenes Blatt.
function druckeTag(abtBestellungen, kundeBestellungen){
  abtBestellungen   = abtBestellungen   || [];
  kundeBestellungen = kundeBestellungen || [];
  if (abtBestellungen.length===0 && kundeBestellungen.length===0){
    toast("Für diesen Tag gibt es keine Bestellungen.","err"); return;
  }
  const area = document.getElementById("print-area");
  clear(area);

  function posTabelle(b){
    return h("table",{},
      ...(b.positionen||[]).map(p=>h("tr",{},
        h("td",{class:"pm",text:String(p.menge)}),
        h("td",{text:p.artikel?.name || "(Artikel entfernt)"})
      ))
    );
  }

  // nach Abteilung gruppieren (beide Arten), Schlüssel: Kürzel, sonst Name
  const gruppen = new Map();
  function eintrag(b){
    const key = b.abteilung?.kuerzel || b.abteilung?.name || "—";
    if (!gruppen.has(key)){
      gruppen.set(key, {
        name:   b.abteilung?.name || key,
        sort:   b.abteilung?.kuerzel || b.abteilung?.name || "",
        sammel: !!b.abteilung?.sammelbestellung,
        abt: [], kunde: []
      });
    }
    return gruppen.get(key);
  }
  for (const b of abtBestellungen)   eintrag(b).abt.push(b);
  for (const b of kundeBestellungen) eintrag(b).kunde.push(b);

  const sortiert = [...gruppen.values()].sort((a,b)=>a.sort.localeCompare(b.sort));

  for (const g of sortiert){
    // 1) Abteilungsbestellungen
    const orders = [...g.abt].sort((x,y)=>String(x.bestellnr).localeCompare(String(y.bestellnr)));
    if (orders.length){
      if (g.sammel){
        const seite = h("div",{class:"p-page"},
          h("h2",{text:"Auhof — Sammelbestellung"}),
          h("div",{style:"margin-top:4px;font-weight:600",text:g.name}),
          h("div",{style:"color:#555",text:"Datum: "+(orders[0]?fmtDatum(orders[0].erstellt_am):"")})
        );
        orders.forEach(b=>{
          seite.append(h("div",{class:"p-sub"},
            h("div",{class:"p-nr",text:b.bestellnr}),
            posTabelle(b)
          ));
        });
        area.append(seite);
      } else {
        orders.forEach(b=>{
          area.append(h("div",{class:"p-page"},
            h("h2",{text:"Auhof — Bestellung"}),
            h("div",{class:"p-nr",style:"margin-top:6px;font-size:18px",text:b.bestellnr}),
            h("div",{style:"margin-top:4px",text:"Abteilung: "+g.name}),
            h("div",{style:"color:#555",text:"Datum: "+fmtDatum(b.erstellt_am)}),
            posTabelle(b)
          ));
        });
      }
    }
    // 2) Kundenbestellungen dieser Abteilung: je ein eigenes Blatt
    const korders = [...g.kunde].sort((x,y)=>String(x.bestellnr).localeCompare(String(y.bestellnr)));
    korders.forEach(b=> area.append(kundeDruckSeite(b, g.name)));
  }
  window.print();
}

// =====================================================================
//  Kundenbestellung: Infozeilen (für Anzeige und Druck)
// =====================================================================
function kundeInfoPaare(b){
  const paare = [];
  paare.push(["Kunde", ((b.vorname||"")+" "+(b.nachname||"")).trim()]);
  paare.push(["E-Mail", b.email||""]);
  if (b.telefon) paare.push(["Telefon", b.telefon]);
  paare.push(["Bezahlart", b.bezahlart==="rechnung" ? "Auf Rechnung" : "Vor Ort"]);
  if (b.bezahlart==="vor_ort") paare.push(["Bezahlt", b.bezahlt ? "Ja" : "Nein"]);
  if (b.modus==="abholung"){
    const an = abteilungName(b.abhol_abteilung_id);
    paare.push(["Abwicklung", "Abholung" + (an ? " – "+an : "")]);
    paare.push(["Abholtermin", fmtTag(b.liefertag) + (b.lieferzeit ? ", "+hhmm(b.lieferzeit)+" Uhr" : "")]);
  } else {
    paare.push(["Abwicklung", "Lieferung"]);
    paare.push(["Lieferadresse", b.lieferadresse||""]);
    paare.push(["Liefertermin", fmtTag(b.liefertag) + (b.lieferzeit ? ", "+hhmm(b.lieferzeit)+" Uhr" : "")]);
  }
  if (b.bezahlart==="rechnung") paare.push(["Rechnungsadresse", b.rechnungsadresse||""]);
  return paare;
}

function kundeDruckSeite(b, abtName){
  const infoTbl = h("table",{},
    ...kundeInfoPaare(b).map(([k,v])=> h("tr",{},
      h("td",{class:"pk",text:k}),
      h("td",{text:v})
    ))
  );
  return h("div",{class:"p-page"},
    h("h2",{text:"Auhof — Kundenbestellung"}),

// =====================================================================
//  Kundenbestellung: Formular (Abteilung) — Anlegen / Ändern
// =====================================================================
function renderKundeFormular(wrap, editB=null){
  const f = editB ? {
    vorname: editB.vorname||"", nachname: editB.nachname||"", email: editB.email||"",
    telefon: editB.telefon||"", bezahlart: editB.bezahlart||"vor_ort",
    modus: editB.modus||"abholung", abhol_abteilung_id: editB.abhol_abteilung_id||"",
    rechnungsadresse: editB.rechnungsadresse||"", lieferadresse: editB.lieferadresse||"",
    liefertag: editB.liefertag ? String(editB.liefertag).slice(0,10) : "",
    lieferzeit: editB.lieferzeit ? hhmm(editB.lieferzeit) : "",
    freitext: editB.freitext||"", bezahlt: !!editB.bezahlt
  } : {
    vorname:"", nachname:"", email:"", telefon:"", bezahlart:"vor_ort",
    modus:"abholung", abhol_abteilung_id:"", rechnungsadresse:"", lieferadresse:"",
    liefertag:"", lieferzeit:"", freitext:"", bezahlt:false
  };

  // Kopf im Ändern-Modus
  if (editB){
    wrap.append(h("div",{class:"card",style:"margin-bottom:1rem;display:flex;align-items:center;gap:.8rem"},
      h("div",{},
        h("div",{style:"font-weight:600",text:"Kundenbestellung ändern"}),
        h("div",{class:"mono muted",style:"font-size:13px",text:editB.bestellnr})
      ),
      h("button",{class:"btn-ghost btn-sm",style:"margin-left:auto",text:"Abbrechen",
        onclick:()=>{ state.editKunde=null; state.tab="meine"; state.listenModus="kunde"; renderApp(); }})
    ));
  }

  // Bestellschluss-Hinweis / -Sperre (eigener Kunden-Bestellschluss)
  const schluss = state.konto.bestellschluss_kunde;
  const gesperrt = istNachBestellschluss(schluss);
  if (schluss){
    wrap.append(h("div",{class:"card",
      style:"padding:.7rem .9rem;margin-bottom:1rem;"+(gesperrt ? "border-color:#5a2f34;background:#2c1c1e" : "")},
      gesperrt
        ? h("div",{style:"color:#f0c2c7"},
            h("b",{text:"Bestellschluss "+hhmm(schluss)+" Uhr überschritten."}),
            " Für heute sind keine "+(editB?"Änderungen":"Kundenbestellungen")+" mehr möglich.")
        : h("div",{class:"muted"}, "Bestellschluss heute um ",
            h("b",{style:"color:var(--ink)",text:hhmm(schluss)+" Uhr"}), ".")
    ));
  }

  // ---- Eingabefelder ----
  const vornameI  = h("input",{type:"text",value:f.vorname});
  const nachnameI = h("input",{type:"text",value:f.nachname});
  const emailI    = h("input",{type:"email",value:f.email});
  const telefonI  = h("input",{type:"tel",value:f.telefon});

  const bezahlSel = h("select",{},
    h("option",{value:"vor_ort",  ...(f.bezahlart==="vor_ort" ?{selected:"selected"}:{}), text:"Vor Ort"}),
    h("option",{value:"rechnung", ...(f.bezahlart==="rechnung"?{selected:"selected"}:{}), text:"Auf Rechnung"})
  );
  const modusSel = h("select",{},
    h("option",{value:"abholung",  ...(f.modus==="abholung" ?{selected:"selected"}:{}), text:"Abholung"}),
    h("option",{value:"lieferung", ...(f.modus==="lieferung"?{selected:"selected"}:{}), text:"Lieferung"})
  );
  const modusHint = h("div",{class:"muted",style:"font-size:12px;margin-top:.3rem",
    text:"Vor Ort ⇒ nur Abholung möglich."});

  const abholSel = h("select",{},
    h("option",{value:"",text:"— Abteilung wählen —"}),
    ...state.abteilungenListe.map(a=>h("option",{value:a.id,
      ...(a.id===f.abhol_abteilung_id?{selected:"selected"}:{}), text:a.name}))
  );

  const rechnungI   = h("textarea",{rows:"2",placeholder:"Strasse, PLZ Ort"}, f.rechnungsadresse);
  const lieferI     = h("textarea",{rows:"2",placeholder:"Strasse, PLZ Ort"}, f.lieferadresse);
  const liefertagI  = h("input",{type:"date",value:f.liefertag});
  const lieferzeitI = h("input",{type:"time",value:f.lieferzeit});
  const freitextI   = h("textarea",{rows:"5",placeholder:"Was soll bestellt werden?"}, f.freitext);
  const bezahltCb   = h("input",{type:"checkbox",style:"width:auto;margin:0;cursor:pointer"});
  bezahltCb.checked = !!f.bezahlt;

  // Bedingte Blöcke
  const abholWrap      = h("div",{style:"margin-top:.7rem"}, h("label",{text:"Abhol-Abteilung"}), abholSel);
  const lieferWrap     = h("div",{style:"margin-top:.7rem"}, h("label",{text:"Lieferadresse"}), lieferI);
  const lieferzeitLbl  = h("label",{text:"Lieferzeit"});
  const lieferzeitWrap = h("div",{}, lieferzeitLbl, lieferzeitI);
  const rechnungWrap   = h("div",{style:"margin-top:.7rem"}, h("label",{text:"Rechnungsadresse"}), rechnungI);
  const modusWrap      = h("div",{}, h("label",{text:"Abwicklung"}), modusSel, modusHint);
  const bezahltWrap    = h("label",{style:"margin-top:.7rem;display:flex;align-items:center;gap:.5rem;color:var(--ink);cursor:pointer"},
                           bezahltCb, "Bereits bezahlt");

  function sync(){
    const vorOrt = (bezahlSel.value === "vor_ort");
    modusSel.disabled = vorOrt;
    if (vorOrt){ modusSel.value = "abholung"; f.modus = "abholung"; }
    modusHint.style.display = vorOrt ? "" : "none";

    const abholung = (modusSel.value === "abholung");
    abholWrap.style.display      = abholung ? "" : "none";
    lieferWrap.style.display     = abholung ? "none" : "";
    lieferzeitWrap.style.display = "";                       // Zeit jetzt in beiden Fällen Pflicht
    lieferzeitLbl.textContent    = abholung ? "Abholzeit" : "Lieferzeit";
    rechnungWrap.style.display   = (bezahlSel.value === "rechnung") ? "" : "none";
    bezahltWrap.style.display    = vorOrt ? "" : "none";     // „Bezahlt" nur bei Vor Ort
  }

  bezahlSel.addEventListener("change",()=>{
    f.bezahlart = bezahlSel.value;
    if (f.bezahlart==="vor_ort"){ modusSel.value="abholung"; f.modus="abholung"; }
    sync();
  });
  modusSel.addEventListener("change",()=>{ f.modus = modusSel.value; sync(); });

  const submitBtn = h("button",{class:"btn",text: editB ? "Änderung speichern" : "Kundenbestellung senden"});
  if (gesperrt){ submitBtn.disabled = true; submitBtn.style.opacity = .5; }

  function readForm(){
    f.vorname          = vornameI.value.trim();
    f.nachname         = nachnameI.value.trim();
    f.email            = emailI.value.trim();
    f.telefon          = telefonI.value.trim();
    f.bezahlart        = bezahlSel.value;
    f.modus            = modusSel.value;
    f.abhol_abteilung_id = abholSel.value;
    f.rechnungsadresse = rechnungI.value.trim();
    f.lieferadresse    = lieferI.value.trim();
    f.liefertag        = liefertagI.value;
    f.lieferzeit       = lieferzeitI.value;
    f.freitext         = freitextI.value.trim();
    f.bezahlt          = bezahltCb.checked;
    if (f.bezahlart==="vor_ort") f.modus = "abholung";
  }

  submitBtn.addEventListener("click", async ()=>{
    readForm();
    if (istNachBestellschluss(state.konto.bestellschluss_kunde))
      return toast("Bestellschluss überschritten – heute nicht mehr möglich.","err");
    if (!f.vorname || !f.nachname) return toast("Vor- und Nachname sind Pflicht.","err");
    if (!f.email || f.email.indexOf("@") < 1) return toast("Eine gültige E-Mail-Adresse ist Pflicht.","err");
    if (!f.liefertag)
      return toast(f.modus==="abholung" ? "Abholdatum ist Pflicht." : "Lieferdatum ist Pflicht.","err");
    if (!f.lieferzeit)
      return toast(f.modus==="abholung" ? "Abholzeit ist Pflicht." : "Lieferzeit ist Pflicht.","err");
    if (f.bezahlart==="rechnung" && !f.rechnungsadresse)
      return toast("Bei Bezahlung auf Rechnung ist die Rechnungsadresse Pflicht.","err");
    if (f.modus==="abholung"){
      if (!f.abhol_abteilung_id) return toast("Bitte eine Abhol-Abteilung wählen.","err");
    } else {
      if (!f.lieferadresse) return toast("Bei Lieferung ist die Lieferadresse Pflicht.","err");
    }
    if (!f.freitext) return toast("Der Bestelltext darf nicht leer sein.","err");

    const p_daten = {
      vorname: f.vorname, nachname: f.nachname, email: f.email, telefon: f.telefon,
      bezahlart: f.bezahlart, modus: f.modus,
      abhol_abteilung_id: f.modus==="abholung"  ? f.abhol_abteilung_id : "",
      rechnungsadresse:   f.bezahlart==="rechnung" ? f.rechnungsadresse : "",
      lieferadresse:      f.modus==="lieferung"  ? f.lieferadresse : "",
      liefertag: f.liefertag,
      lieferzeit: f.lieferzeit,
      freitext: f.freitext,
      bezahlt: (f.bezahlart==="vor_ort") ? f.bezahlt : false
    };

    submitBtn.disabled = true; submitBtn.textContent = editB ? "Speichern…" : "Senden…";
    let data, error;
    if (editB){
      ({ data, error } = await sb.rpc("kundenbestellung_aendern", { p_bestellung_id: editB.id, p_daten }));
    } else {
      ({ data, error } = await sb.rpc("kundenbestellung_anlegen", { p_daten }));
    }
    submitBtn.disabled = false; submitBtn.textContent = editB ? "Änderung speichern" : "Kundenbestellung senden";
    if (error){ toast("Konnte nicht speichern: "+error.message,"err"); return; }

    const bestellNr = editB ? editB.bestellnr : (data?.bestellnr || "");
    if (editB){
      state.editKunde = null;
      toast("Kundenbestellung "+editB.bestellnr+" geändert.","ok");
    } else {
      toast("Kundenbestellung "+bestellNr+" gesendet.","ok");
    }

    await ladeDaten();

    // Bezahlstatus setzen/absichern (nur „Vor Ort") über eigene RPC –
    // so müssen Anlegen/Ändern die Logik nicht kennen.
    const zielBezahlt = (f.bezahlart==="vor_ort") ? f.bezahlt : false;
    const row = bestellNr ? state.kundenbestellungen.find(x=>x.bestellnr===bestellNr) : null;
    if (row && (!!row.bezahlt !== !!zielBezahlt)){
      const { error: bErr } = await sb.rpc("kundenbestellung_bezahlt_setzen",
        { p_bestellung_id: row.id, p_bezahlt: zielBezahlt });
      if (bErr) toast("Bezahlstatus konnte nicht gesetzt werden: "+bErr.message,"err");
      else await ladeDaten();
    }

    state.tab = "meine"; state.listenModus = "kunde"; renderApp();
  });

  // ---- Formular zusammenbauen ----
  wrap.append(
    h("div",{class:"card"},
      h("h3",{text:"Kundendaten",style:"margin-bottom:.8rem"}),
      h("div",{class:"grid2"},
        h("div",{}, h("label",{text:"Vorname"}), vornameI),
        h("div",{}, h("label",{text:"Nachname"}), nachnameI)
      ),
      h("div",{class:"grid2",style:"margin-top:.7rem"},
        h("div",{}, h("label",{text:"E-Mail"}), emailI),
        h("div",{}, h("label",{text:"Telefon (optional)"}), telefonI)
      )
    ),
    h("div",{class:"card"},
      h("h3",{text:"Abwicklung",style:"margin-bottom:.8rem"}),
      h("div",{class:"grid2"},
        h("div",{}, h("label",{text:"Bezahlart"}), bezahlSel),
        modusWrap
      ),
      bezahltWrap,
      abholWrap,
      lieferWrap,
      h("div",{class:"grid2",style:"margin-top:.7rem"},
        h("div",{}, h("label",{text:"Liefer-/Abholdatum"}), liefertagI),
        lieferzeitWrap
      ),
      rechnungWrap
    ),
    h("div",{class:"card"},
      h("h3",{text:"Bestelltext",style:"margin-bottom:.8rem"}),
      freitextI
    ),
    h("div",{style:"margin-top:1rem"}, submitBtn)
  );

  sync();
}

function renderArtikel(wrap){
  // Formular: neuen Artikel anlegen
  const nameI = h("input",{type:"text",placeholder:"Artikelname"});
  const grpSel = h("select",{},
    h("option",{value:"",text:"— Gruppe wählen —"}),
    ...state.gruppen.map(g=>h("option",{value:g.id,text:g.name}))
  );
  const addBtn = h("button",{class:"btn",text:"Artikel anlegen"});
  addBtn.addEventListener("click", async ()=>{
    const name=nameI.value.trim();
    if (!name) return toast("Name fehlt.","err");
    if (!grpSel.value) return toast("Bitte eine Gruppe wählen.","err");
    addBtn.disabled=true;
    const { error } = await sb.from("artikel").insert({name, gruppe_id:grpSel.value, aktiv:true});
    addBtn.disabled=false;
    if (error){ toast("Fehler: "+error.message,"err"); return; }
    nameI.value=""; toast("Artikel angelegt.","ok");
    await ladeDaten(); renderApp();
  });

  wrap.append(h("div",{class:"card"},
    h("h3",{text:"Neuer Artikel",style:"margin-bottom:.8rem"}),
    h("div",{class:"grid2"},
      h("div",{}, h("label",{text:"Name"}), nameI),
      h("div",{}, h("label",{text:"Gruppe"}), grpSel)
    ),
    h("div",{style:"margin-top:.8rem"}, addBtn)
  ));

  if (state.gruppen.length===0){
    wrap.append(h("div",{class:"empty"}, h("div",{class:"muted",
      text:"Es gibt noch keine Gruppen — lege zuerst unter „Gruppe erstellen“ welche an."})));
  }

  // --- Filter für bestehende Artikel ---
  const filterSel = h("select",{style:"max-width:220px"},
    h("option",{value:"",text:"Alle Gruppen"}),
    ...state.gruppen.map(g=>h("option",{value:String(g.id),text:g.name}))
  );
  filterSel.value = state.artikelFilter || "";
  filterSel.addEventListener("change",()=>{ state.artikelFilter = filterSel.value; zeichneListe(); });

  wrap.append(h("div",{class:"row",style:"margin:1.2rem 0 .2rem"},
    h("div",{class:"muted",style:"font-size:13px",text:"Bestehende Artikel"}),
    h("div",{style:"margin-left:auto;max-width:220px;width:100%"}, filterSel)
  ));

  const listeBox = h("div",{});
  wrap.append(listeBox);
  zeichneListe();

  function zeichneListe(){
    clear(listeBox);
    const f = state.artikelFilter || "";
    const gruppen = f ? state.gruppen.filter(g=>String(g.id)===f) : state.gruppen;

    let gezeigt = 0;
    for (const g of gruppen){
      const items = state.artikel.filter(a=>a.gruppe_id===g.id);
      if (items.length===0) continue;
      gezeigt += items.length;
      listeBox.append(h("div",{class:"group-h"}, h("h3",{text:g.name}), h("span",{class:"count",text:items.length+" Artikel"})));
      items.forEach(a=>listeBox.append(artikelZeile(a)));
    }
    if (gezeigt===0){
      listeBox.append(h("div",{class:"empty"},
        h("div",{class:"muted",text: f ? "Keine Artikel in dieser Gruppe." : "Noch keine Artikel angelegt."})));
    }
  }
}

function artikelZeile(a){
  const zeile = h("div",{class:"art"+(a.aktiv?"":" inactive")});
  const nameSpan = h("div",{class:"name"}, a.name,
    a.aktiv?null:h("small",{text:"inaktiv"}));

  const toggle = h("button",{class:"btn-ghost btn-sm",text:a.aktiv?"Ausblenden":"Aktiv setzen",
    onclick:async ()=>{
      const { error } = await sb.from("artikel").update({aktiv:!a.aktiv}).eq("id",a.id);
      if (error){ toast("Fehler: "+error.message,"err"); return; }
      await ladeDaten(); renderApp();
    }});
  const editBtn = h("button",{class:"btn-ghost btn-sm",text:"Bearbeiten",
    onclick:()=>bearbeiteArtikel(zeile, a)});
  const delBtn = h("button",{class:"btn-danger btn-sm",text:"Löschen",
    onclick:async ()=>{
      if (!confirm('Artikel „'+a.name+'“ löschen?')) return;
      const { error } = await sb.from("artikel").delete().eq("id",a.id);
      if (error){ toast("Fehler: "+error.message,"err"); return; }
      toast("Artikel gelöscht.","ok"); await ladeDaten(); renderApp();
    }});

  zeile.append(nameSpan, h("div",{class:"row"}, toggle, editBtn, delBtn));
  return zeile;
}

function bearbeiteArtikel(zeile, a){
  clear(zeile);
  const nameI = h("input",{type:"text",value:a.name,style:"flex:1;min-width:140px"});
  const grpSel = h("select",{style:"max-width:180px"},
    h("option",{value:"",text:"Ohne Gruppe"}),
    ...state.gruppen.map(g=>h("option",{value:g.id,text:g.name,...(g.id===a.gruppe_id?{selected:"selected"}:{})}))
  );
  const save = h("button",{class:"btn btn-sm",text:"Speichern",onclick:async ()=>{
    const name=nameI.value.trim(); if(!name) return toast("Name fehlt.","err");
    const { error } = await sb.from("artikel").update({name, gruppe_id:grpSel.value||null}).eq("id",a.id);
    if (error){ toast("Fehler: "+error.message,"err"); return; }
    toast("Gespeichert.","ok"); await ladeDaten(); renderApp();
  }});
  const cancel = h("button",{class:"btn-ghost btn-sm",text:"Abbrechen",onclick:()=>renderApp()});
  zeile.append(nameI, grpSel, save, cancel);
  zeile.classList.remove("inactive");
  nameI.focus();
}

// =====================================================================
//  Gruppen-Verwaltung (Admin/Leitung)
// =====================================================================
function renderGruppen(wrap){
  const nameI = h("input",{type:"text",placeholder:"Gruppenname"});
  const addBtn = h("button",{class:"btn",text:"Gruppe anlegen",onclick:async ()=>{
    const name=nameI.value.trim(); if(!name) return toast("Name fehlt.","err");
    const sort=(state.gruppen.length? Math.max(...state.gruppen.map(g=>g.sortierung||0)) : 0)+1;
    const { error } = await sb.from("gruppen").insert({name, sortierung:sort});
    if (error){ toast("Fehler (Name evtl. schon vergeben): "+error.message,"err"); return; }
    nameI.value=""; toast("Gruppe angelegt.","ok"); await ladeDaten(); renderApp();
  }});

  wrap.append(h("div",{class:"card"},
    h("h3",{text:"Neue Gruppe",style:"margin-bottom:.8rem"}),
    h("div",{class:"row"}, h("div",{style:"flex:1"}, nameI), addBtn)
  ));

  if (state.gruppen.length===0){
    wrap.append(h("div",{class:"empty"}, h("div",{class:"muted",text:"Noch keine Gruppen."})));
    return;
  }

  const tbl = h("table",{class:"list"},
    h("thead",{}, h("tr",{}, h("th",{text:"Gruppe"}), h("th",{text:"Artikel"}), h("th",{text:""}))),
  );
  const tbody = h("tbody",{});
  for (const g of state.gruppen){
    const anzahl = state.artikel.filter(a=>a.gruppe_id===g.id).length;
    const nameCell = h("td",{}, g.name);
    const actions = h("td",{style:"text-align:right"},
      h("div",{class:"row",style:"justify-content:flex-end"},
        h("button",{class:"btn-ghost btn-sm",text:"Umbenennen",onclick:()=>{
          clear(nameCell);
          const inp=h("input",{type:"text",value:g.name,style:"max-width:200px"});
          const ok=h("button",{class:"btn btn-sm",text:"OK",onclick:async ()=>{
            const nn=inp.value.trim(); if(!nn) return;
            const { error } = await sb.from("gruppen").update({name:nn}).eq("id",g.id);
            if (error){ toast("Fehler: "+error.message,"err"); return; }
            await ladeDaten(); renderApp();
          }});
          nameCell.append(h("div",{class:"row"},inp,ok)); inp.focus();
        }}),
        h("button",{class:"btn-danger btn-sm",text:"Löschen",onclick:async ()=>{
          const warn = anzahl>0
            ? 'Gruppe „'+g.name+'“ löschen? ACHTUNG: '+anzahl+' Artikel darin werden mitgelöscht!'
            : 'Gruppe „'+g.name+'“ löschen?';
          if (!confirm(warn)) return;
          const { error } = await sb.from("gruppen").delete().eq("id",g.id);
          if (error){ toast("Fehler: "+error.message,"err"); return; }
          toast("Gruppe gelöscht.","ok"); await ladeDaten(); renderApp();
        }})
      )
    );
    tbody.append(h("tr",{}, nameCell, h("td",{class:"mono",text:String(anzahl)}), actions));
  }
  tbl.append(tbody);
  wrap.append(h("div",{class:"card",style:"padding:.6rem"}, h("div",{class:"tscroll"}, tbl)));
}

// =====================================================================
//  Abteilungen & Passwörter (nur Admin)
// =====================================================================
async function rufeFunktion(body){
  const { data, error } = await sb.functions.invoke(FUNKTION, { body });
  if (error){
    let msg = error.message;
    try { const d = await error.context.json(); if (d?.error) msg = d.error; } catch {}
    return { error: msg };
  }
  return { data };
}

function renderAbteilungen(wrap){
  // --- Neue Abteilung anlegen ---
  const nI = h("input",{type:"text",placeholder:"z.B. Seegasse"});
  const kI = h("input",{type:"text",placeholder:"z.B. SEE"});
  const pI = h("input",{type:"text",placeholder:"mind. 8 Zeichen"});
  const addBtn = h("button",{class:"btn",text:"Abteilung anlegen",onclick:async ()=>{
    const name=nI.value.trim(), kuerzel=kI.value.trim(), passwort=pI.value;
    if (!/^[A-Za-z0-9]+$/.test(name)) return toast("Name: nur Buchstaben/Zahlen, keine Leerzeichen.","err");
    if (!kuerzel) return toast("Kürzel fehlt.","err");
    if (passwort.length<8) return toast("Passwort mind. 8 Zeichen.","err");
    addBtn.disabled=true; addBtn.textContent="Anlegen…";
    const { data, error } = await rufeFunktion({aktion:"abteilung_anlegen", name, kuerzel, passwort});
    addBtn.disabled=false; addBtn.textContent="Abteilung anlegen";
    if (error){ toast(error,"err"); return; }
    nI.value=""; kI.value=""; pI.value="";
    toast('Abteilung „'+name+'“ angelegt.',"ok");
    await ladeDaten(); renderApp();
  }});

  wrap.append(h("div",{class:"card"},
    h("h3",{text:"Neue Abteilung",style:"margin-bottom:.8rem"}),
    h("div",{class:"grid2"},
      h("div",{}, h("label",{text:"Name (Login)"}), nI),
      h("div",{}, h("label",{text:"Kürzel (für Bestellnr.)"}), kI)
    ),
    h("div",{style:"margin-top:.7rem"}, h("label",{text:"Startpasswort"}), pI),
    h("div",{style:"margin-top:.8rem"}, addBtn)
  ));

  // --- Liste bestehender Abteilungen (inkl. Bestellschluss) ---
  const abt = state.konten.filter(k=>k.rolle==="abteilung");
  const tbody = h("tbody",{});
  abt.forEach(k=>{
    // Ein Zeitfeld + Speichern-Knopf für je einen Bestellschluss.
    //   feld: "abteilung" -> Abteilungsbestellungen, "kunde" -> Kundenbestellungen
    function schlussZelle(feld, aktuellerWert){
      const zeitI = h("input",{type:"time",value:hhmm(aktuellerWert),style:"max-width:130px"});
      const saveBtn = h("button",{class:"btn btn-sm",text:"Speichern",onclick:async ()=>{
        saveBtn.disabled=true; saveBtn.textContent="…";
        const { error } = await rufeFunktion({aktion:"bestellschluss_setzen", id:k.id, feld, bestellschluss: zeitI.value || null});
        saveBtn.disabled=false; saveBtn.textContent="Speichern";
        if (error){ toast(error,"err"); return; }
        const was = (feld==="kunde") ? "Kunden-Bestellschluss" : "Bestellschluss";
        toast(zeitI.value
          ? (was+' für „'+k.name+'“: '+zeitI.value+' Uhr.')
          : (was+' für „'+k.name+'“ entfernt.'),"ok");
        await ladeDaten(); renderApp();
      }});
      return h("td",{}, h("div",{class:"row"}, zeitI, saveBtn));
    }
    const zelleAbt   = schlussZelle("abteilung", k.bestellschluss);
    const zelleKunde = schlussZelle("kunde",     k.bestellschluss_kunde);

    // Sammelbestellung: Haken speichert sofort (ohne Re-Render)
    const sammelCb = h("input",{type:"checkbox",style:"width:auto;margin:0;cursor:pointer"});
    sammelCb.checked = !!k.sammelbestellung;
    sammelCb.addEventListener("change", async ()=>{
      sammelCb.disabled = true;
      const gewuenscht = sammelCb.checked;
      const { error } = await rufeFunktion({aktion:"sammelbestellung_setzen", id:k.id, sammelbestellung: gewuenscht});
      sammelCb.disabled = false;
      if (error){ sammelCb.checked = !gewuenscht; toast(error,"err"); return; }
      k.sammelbestellung = gewuenscht;
      toast(gewuenscht
        ? ('Sammelbestellung für „'+k.name+'“ aktiviert.')
        : ('Sammelbestellung für „'+k.name+'“ deaktiviert.'),"ok");
    });

    tbody.append(h("tr",{},
      h("td",{text:k.name}),
      h("td",{class:"mono",text:k.kuerzel||"—"}),
      zelleAbt,
      zelleKunde,
      h("td",{style:"text-align:center"}, sammelCb)
    ));
  });
  wrap.append(h("div",{class:"card",style:"padding:.6rem"},
    h("div",{class:"tscroll"},
      h("table",{class:"list"},
        h("thead",{}, h("tr",{},
          h("th",{text:"Abteilung"}), h("th",{text:"Kürzel"}),
          h("th",{text:"Bestellschluss Abteilung"}), h("th",{text:"Bestellschluss Kunden"}),
          h("th",{text:"Sammelbestellung"}))),
        tbody
      )
    ),
    abt.length===0 ? h("div",{class:"empty"},h("div",{class:"muted",text:"Noch keine Abteilungen."})) : null,
    h("div",{class:"muted",style:"font-size:12px;padding:.5rem .5rem 0",
      text:"Keine Zeit eingetragen = kein Bestellschluss (rund um die Uhr möglich). Die Zeit gilt täglich. „Bestellschluss Abteilung“ betrifft die Abteilungsbestellungen, „Bestellschluss Kunden“ die Kundenbestellungen – beide sind voneinander unabhängig. Sammelbestellung: Haken = Tagesbestellungen werden beim „Tag drucken“ pro Abteilung auf einem Blatt zusammengefasst."})
  ));

  // --- Passwort setzen (jedes Konto) ---
  const istLeitung = state.konto.rolle === "leitung";
  const zielKonten = istLeitung ? state.konten.filter(k=>k.rolle!=="admin") : state.konten;
  const zielSel = h("select",{},
    ...zielKonten.map(k=>h("option",{value:k.name,text:k.name+" ("+(ROLLE_LABEL[k.rolle]||k.rolle)+")"}))
  );
  const npI = h("input",{type:"text",placeholder:"neues Passwort, mind. 8 Zeichen"});
  const pwBtn = h("button",{class:"btn",text:"Passwort setzen",onclick:async ()=>{
    if (npI.value.length<8) return toast("Passwort mind. 8 Zeichen.","err");
    pwBtn.disabled=true; pwBtn.textContent="Setzen…";
    const { error } = await rufeFunktion({aktion:"passwort_setzen", name:zielSel.value, passwort:npI.value});
    pwBtn.disabled=false; pwBtn.textContent="Passwort setzen";
    if (error){ toast(error,"err"); return; }
    npI.value=""; toast("Passwort für „"+zielSel.value+"“ gesetzt.","ok");
  }});
  wrap.append(h("div",{class:"card"},
    h("h3",{text:"Passwort setzen / zurücksetzen",style:"margin-bottom:.8rem"}),
    h("div",{class:"grid2"},
      h("div",{}, h("label",{text:"Konto"}), zielSel),
      h("div",{}, h("label",{text:"Neues Passwort"}), npI)
    ),
    h("div",{style:"margin-top:.8rem"}, pwBtn)
  ));
}

// =====================================================================
//  Auswertung (Leitung/Admin): Zeitraum + Abteilungsfilter
//  Zeigt pro Abteilung -> Gruppe -> Artikel die summierten Mengen
//  aus den ABTEILUNGSbestellungen im gewählten Zeitraum, plus Total.
// =====================================================================

// Reines Datum um n Tage verschieben (UTC-basiert, ohne Zeitzonen-Drift)
function tagPlus(ymd, delta){
  const d = new Date(ymd + "T00:00:00Z");
  d.setUTCDate(d.getUTCDate() + delta);
  return d.toISOString().slice(0,10);
}

// Aggregiert Bestellungen -> [{ name, total, groups:[{name, arts:[{name,menge}]}] }]
function baueAuswertung(orders){
  const artById = new Map(state.artikel.map(a=>[a.id, a]));
  const grpById = new Map(state.gruppen.map(g=>[g.id, g]));
  const depts = new Map();

  for (const b of orders){
    const dName = b.abteilung?.name || b.abteilung?.kuerzel || "—";
    const dKey  = b.abteilung?.kuerzel || b.abteilung?.name || "—";
    if (!depts.has(dKey)) depts.set(dKey, { name:dName, total:0, groups:new Map() });
    const dep = depts.get(dKey);

    for (const p of (b.positionen||[])){
      const menge = Number(p.menge) || 0;
      if (menge <= 0) continue;
      const art     = p.artikel_id ? artById.get(p.artikel_id) : null;
      const artName = art?.name || p.artikel?.name || "(entfernter Artikel)";
      const grpId   = art?.gruppe_id || null;
      const grp     = grpId ? grpById.get(grpId) : null;
      const gKey    = grp ? String(grp.id) : "__none__";
      const gName   = grp ? grp.name : "Ohne Gruppe";
      const gSort   = grp ? (grp.sortierung ?? 9999) : 100000;   // „Ohne Gruppe" zuletzt

      if (!dep.groups.has(gKey)) dep.groups.set(gKey, { name:gName, sort:gSort, arts:new Map() });
      const gg   = dep.groups.get(gKey);
      const aKey = p.artikel_id || ("name:"+artName);
      if (!gg.arts.has(aKey)) gg.arts.set(aKey, { name:artName, menge:0 });
      gg.arts.get(aKey).menge += menge;
      dep.total += menge;
    }
  }

  return [...depts.values()]
    .map(d=>({
      name: d.name,
      total: d.total,
      groups: [...d.groups.values()]
        .sort((a,b)=> a.sort-b.sort || a.name.localeCompare(b.name))
        .map(g=>({ name:g.name, arts:[...g.arts.values()].sort((x,y)=>x.name.localeCompare(y.name)) }))
    }))
    .sort((a,b)=> a.name.localeCompare(b.name));
}

function renderAuswertung(wrap){
  if (!state.auswVon) state.auswVon = heuteZuerich();
  if (!state.auswBis) state.auswBis = heuteZuerich();

  const vonI = h("input",{type:"date",style:"max-width:170px",value:state.auswVon});
  const bisI = h("input",{type:"date",style:"max-width:170px",value:state.auswBis});

  const abtSel = h("select",{style:"max-width:220px"});
  abtSel.append(h("option",{value:"",text:"Alle Abteilungen"}));
  const abteilungen = state.konten.filter(k=>k.rolle==="abteilung")
    .sort((a,b)=>String(a.name).localeCompare(String(b.name)));
  abteilungen.forEach(k=>abtSel.append(
    h("option",{value:k.kuerzel||k.name, text:k.name+(k.kuerzel?" ("+k.kuerzel+")":"")})
  ));
  abtSel.value = state.auswAbt || "";

  const printBtn = h("button",{class:"btn btn-sm",text:"Drucken"});
  const infoLbl  = h("div",{class:"muted",style:"font-size:13px"});

  wrap.append(h("div",{class:"row",style:"margin-bottom:1rem;align-items:flex-end"},
    h("div",{}, h("label",{text:"Von"}), vonI),
    h("div",{}, h("label",{text:"Bis"}), bisI),
    h("div",{}, h("label",{text:"Abteilung"}), abtSel),
    h("div",{style:"margin-left:auto;display:flex;align-items:center;gap:.7rem"}, infoLbl, printBtn)
  ));

  const box = h("div",{});
  wrap.append(box);

  let rangeRoh = [];          // im Zeitraum geladene Abteilungsbestellungen (ungefiltert nach Abt.)
  let letzteDaten = [];       // zuletzt gezeichnete Aggregation (für den Druck)

  async function ladeZeitraum(){
    const von = state.auswVon, bis = state.auswBis;
    clear(box);
    if (von > bis){
      infoLbl.textContent = "";
      printBtn.disabled = true; printBtn.style.opacity = .5;
      box.append(h("div",{class:"empty"},
        h("div",{class:"muted",text:"Das «Von»-Datum liegt nach dem «Bis»-Datum."})));
      return;
    }
    infoLbl.textContent = "Lädt…";
    box.append(h("div",{class:"empty"}, h("div",{class:"muted",text:"Lädt…"})));

    // Etwas breiter laden (± 1 Tag, wegen Zeitzone), danach exakt nach Zürich-Tag filtern.
    const { data, error } = await sb.from("bestellungen")
      .select(`id,bestellnr,erstellt_am,
               abteilung:konten!bestellungen_abteilung_id_fkey(name,kuerzel),
               positionen:bestellpositionen(menge, artikel_id, artikel(name))`)
      .gte("erstellt_am", tagPlus(von,-1)+"T00:00:00Z")
      .lte("erstellt_am", tagPlus(bis, 1)+"T23:59:59Z")
      .order("erstellt_am",{ascending:false});

    clear(box);
    if (error){
      infoLbl.textContent = "";
      box.append(h("div",{class:"empty"}, h("div",{class:"muted",text:"Konnte nicht laden: "+error.message})));
      return;
    }
    rangeRoh = (data||[]).filter(b=>{
      const d = zurichDatum(b.erstellt_am);
      return d >= von && d <= bis;
    });
    zeichne();
  }

  function zeichne(){
    clear(box);
    const gefiltert = state.auswAbt
      ? rangeRoh.filter(b=>(b.abteilung?.kuerzel||b.abteilung?.name) === state.auswAbt)
      : rangeRoh;

    const daten = baueAuswertung(gefiltert);
    letzteDaten = daten;

    const anzAbt = daten.length;
    infoLbl.textContent = anzAbt===0 ? "Keine Bestellungen"
      : (anzAbt + (anzAbt===1 ? " Abteilung" : " Abteilungen"));
    printBtn.disabled = anzAbt===0;
    printBtn.style.opacity = anzAbt===0 ? .5 : 1;

    if (anzAbt===0){
      box.append(h("div",{class:"empty"},
        h("div",{class:"muted",text:"Für diesen Zeitraum gibt es keine Abteilungsbestellungen."})));
      return;
    }

    for (const d of daten){
      const kopf = h("div",{class:"ticket-top"},
        h("h3",{style:"font-size:16px",text:d.name}),
        h("span",{class:"ticket-meta mono",text:d.total+" Stück gesamt"})
      );
      const body = h("div",{class:"ticket-body"});
      for (const g of d.groups){
        body.append(h("div",{class:"group-h",style:"margin:.8rem 0 .3rem"},
          h("h3",{style:"font-size:14px;color:var(--dim)",text:g.name})));
        g.arts.forEach(a=>{
          body.append(h("div",{class:"pos"},
            h("span",{class:"m",text:String(a.menge)}),
            h("span",{class:"n",text:a.name})
          ));
        });
      }
      box.append(h("div",{class:"ticket"}, kopf, body));
    }
  }

  vonI.addEventListener("change",()=>{
    if (!vonI.value) vonI.value = heuteZuerich();
    state.auswVon = vonI.value; ladeZeitraum();
  });
  bisI.addEventListener("change",()=>{
    if (!bisI.value) bisI.value = heuteZuerich();
    state.auswBis = bisI.value; ladeZeitraum();
  });
  abtSel.addEventListener("change",()=>{ state.auswAbt = abtSel.value; zeichne(); });
  printBtn.addEventListener("click",()=>druckeAuswertung(letzteDaten));

  ladeZeitraum();
}

// Druck der Auswertung: pro Abteilung -> Gruppe -> Artikel (+ Abteilungs-Total)
function druckeAuswertung(daten){
  if (!daten || daten.length===0){ toast("Keine Daten zum Drucken.","err"); return; }
  const area = document.getElementById("print-area");
  clear(area);

  const abtName = state.auswAbt || "Alle Abteilungen";
  area.append(
    h("h2",{text:"Auhof — Auswertung"}),
    h("div",{style:"margin-top:6px",text:"Zeitraum: "+fmtTag(state.auswVon)+" – "+fmtTag(state.auswBis)}),
    h("div",{style:"color:#555",text:"Abteilung: "+abtName})
  );

  for (const d of daten){
    const sec = h("div",{class:"p-sub"},
      h("div",{style:"font-weight:700;font-size:15px",text:d.name})
    );
    for (const g of d.groups){
      sec.append(h("div",{style:"margin-top:8px;font-weight:600",text:g.name}));
      sec.append(h("table",{},
        ...g.arts.map(a=>h("tr",{},
          h("td",{class:"pm",text:String(a.menge)}),
          h("td",{text:a.name})
        ))
      ));
    }
    sec.append(h("div",{style:"margin-top:6px;font-weight:700",text:"Total "+d.name+": "+d.total+" Stück"}));
    area.append(sec);
  }
  window.print();
}
